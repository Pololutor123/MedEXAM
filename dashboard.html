<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedExam — Résultats</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
<header class="header">
<div class="logo">MedExam <span id="header-subtitle" class="hidden">Plateforme médicale</span></div>
<nav class="nav" id="main-nav">
<a class="nav-btn" href="epreuves.html">🎓 Épreuves</a>
<a class="nav-btn" href="creer.html">✏️ Créateur</a>
<a class="nav-btn active" href="dashboard.html">📊 Résultats</a>
</nav>
<div class="user-info">
<div class="user-name"><strong id="header-username"></strong><small id="header-role"></small></div>
<button class="logout-btn" onclick="logout()">Déconnexion</button>
</div>
</header>

<div class="page-inner-wide" style="padding:32px 16px">
<div class="flex items-center gap-12 mb-12" style="flex-wrap:wrap">
<div>
<h2 style="font-size:1.1rem;font-weight:800">Tableau de bord</h2>
<p id="dash-count" style="color:var(--text3);font-size:.82rem"></p>
</div>
<button class="btn btn-secondary btn-sm ml-auto" onclick="exportCSV()">⬇ Exporter CSV</button>
<button class="btn btn-danger btn-sm" onclick="clearAllResults()">🗑 Vider tous les résultats</button>
</div>
<div id="dashboard-content"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script>
(async function() {
const user = await requireAuth({ adminOnly:true });
if (!user) return;
await renderDashboard();
})();
</script>
</body>
</html>
