<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedExam — Épreuves</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
<header class="header">
<div class="logo">MedExam <span id="header-subtitle" class="hidden">Plateforme médicale</span></div>
<nav class="nav" id="main-nav">
<a class="nav-btn active" href="epreuves.html">🎓 Épreuves</a>
<a class="nav-btn hidden" id="nav-creator" href="creer.html">✏️ Créateur</a>
<a class="nav-btn hidden" id="nav-dashboard" href="dashboard.html">📊 Résultats</a>
</nav>
<div class="user-info">
<div class="user-name"><strong id="header-username"></strong><small id="header-role"></small></div>
<button class="logout-btn" onclick="logout()">Déconnexion</button>
</div>
</header>

<div id="exam-list-view" class="page-inner" style="padding:32px 16px">
<div style="margin-bottom:20px">
<h2 id="student-greeting" style="font-size:1.1rem;font-weight:800"></h2>
<p style="color:var(--text3);font-size:.85rem;margin-top:2px">Choisissez une épreuve pour commencer.</p>
</div>
<div id="exam-list"></div>
</div>
<div id="session-view" class="hidden">
<!-- filled by JS -->
</div>
<div id="results-view" class="hidden page-inner" style="padding:32px 16px"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/student.js"></script>
<script>
(async function() {
const user = await requireAuth();
if (!user) return;
if (user.role==='admin') {
document.getElementById('nav-creator').classList.remove('hidden');
document.getElementById('nav-dashboard').classList.remove('hidden');
}
document.getElementById('student-greeting').textContent = `Bonjour, ${user.pseudo} 👋`;
exams = await loadExams();
renderExamList();
})();
</script>
</body>
</html>
