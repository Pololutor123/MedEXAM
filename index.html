<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedExam — Plateforme d'épreuves médicales</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="auth-screen">
<div class="auth-box">
<div class="auth-logo">
<h1>MedExam</h1>
<p>Plateforme d'épreuves médicales</p>
</div>
<div id="auth-form" class="card" style="margin-top:0">
<h2 id="auth-form-title" style="font-size:1rem;font-weight:700;margin-bottom:14px">Connexion</h2>
<div class="form-group"><label class="form-label">Email</label><input type="email" id="auth-email" placeholder="vous@exemple.com" /></div>
<div class="form-group"><label class="form-label">Mot de passe</label><input type="password" id="auth-pwd" placeholder="••••••••" /></div>
<div class="form-group hidden" id="auth-pseudo-group"><label class="form-label">Pseudo</label><input type="text" id="auth-pseudo" placeholder="ex : Marie58" /></div>
<p id="auth-err" class="auth-error hidden"></p>
<button class="btn btn-primary btn-full btn-lg" id="auth-submit-btn" onclick="submitAuth()" style="margin-top:8px">Se connecter →</button>
<p style="text-align:center;margin-top:14px;font-size:.82rem">
<span id="auth-toggle-label">Pas encore de compte ?</span>
<button class="btn-ghost btn-sm" id="auth-toggle-btn" onclick="toggleAuthMode()">Créer un compte</button>
</p>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script>
(async function() {
const { data:{ session } } = await sb.auth.getSession();
if (session) { location.href = 'epreuves.html'; return; }
document.getElementById('auth-pwd').addEventListener('keydown', e=>{ if(e.key==='Enter') submitAuth(); });
})();
</script>
</body>
</html>
